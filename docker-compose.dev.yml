version: '3.8'

# Configuration Docker Compose pour Développement

services:
  db:
    image: postgres:16-alpine
    container_name: ggr_credit_db_dev
    environment:
      POSTGRES_DB: credit_db_dev
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ggr_network_dev

  redis:
    image: redis:7-alpine
    container_name: ggr_credit_redis_dev
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ggr_network_dev

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ggr_credit_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql://credit_user:dev_password@db:5432/credit_db_dev
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read(); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - db
      - redis
    networks:
      - ggr_network_dev
    stdin_open: true
    tty: true

volumes:
  postgres_data_dev:

networks:
  ggr_network_dev:
    driver: bridge
